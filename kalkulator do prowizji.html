<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Wypłat - EE i GAZ</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            position: relative;
        }
        
        .company-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            max-width: 150px;
            height: auto;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-top: 60px;
        }
        h2 {
            text-align: center;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .flex-group {
            display: flex;
            gap: 10px;
        }
        .flex-group > div {
            flex: 1;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        select, input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #aaa;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #218838;
        }
        .results {
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        .summary-row {
            background-color: #f9f9f9;
        }
        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .company-logo {
                position: static;
                display: block;
                margin: 0 auto 20px auto;
                max-width: 120px;
            }
            .container {
                margin-top: 20px;
            }
            .flex-group {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

<img src="logo.png" alt="Logo Direct4Energy" class="company-logo" onerror="this.style.display='none'">

<div class="container">
    <h2>Kalkulator Wypłat</h2>
    
    <div class="form-group">
        <label for="role">1. Stanowisko</label>
        <select id="role">
            <option value="doradca">Doradca</option>
            <option value="trener">Trener</option>
        </select>
    </div>

    <div class="form-group">
        <label for="split">2. Podział prowizji</label>
        <select id="split">
            <option value="1">Solo (100%)</option>
            <option value="2">2 osoby (50/50)</option>
            <option value="3">3 osoby (33/33/33)</option>
            <option value="4">4 osoby (25/25/25/25)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="product">3. Produkt</label>
        <select id="product" onchange="updateSellers()">
            <option value="ee">Energia Elektryczna (EE)</option>
            <option value="gaz">GAZ</option>
        </select>
    </div>

    <div class="form-group">
        <label for="seller">4. Sprzedawca</label>
        <select id="seller" onchange="updateFormFields()">
            <option value="eon">E.ON</option>
            <option value="ekovoltis">Ekovoltis</option>
        </select>
    </div>

    <div class="form-group hidden" id="ekovoltis-margin-group">
        <label for="marginLevel">4a. Masa marży miesięczna (Ekovoltis)</label>
        <select id="marginLevel">
            <option value="do100k">Do 100 000 PLN</option>
            <option value="pow100k">Powyżej 100 000 PLN</option>
        </select>
    </div>

    <div class="flex-group">
        <div class="form-group">
            <label for="volume">5. Zużycie roczne (MWh)</label>
            <input type="number" id="volume" min="1" value="30">
        </div>
        <div class="form-group">
            <label for="markup">6. Narzut (PLN/MWh)</label>
            <input type="number" id="markup" min="1" value="100">
        </div>
    </div>

    <div class="flex-group">
        <div class="form-group">
            <label for="startMonth">7. Start (Miesiąc)</label>
            <select id="startMonth">
                <option value="1">Styczeń</option><option value="2">Luty</option>
                <option value="3">Marzec</option><option value="4" selected>Kwiecień</option>
                <option value="5">Maj</option><option value="6">Czerwiec</option>
                <option value="7">Lipiec</option><option value="8">Sierpień</option>
                <option value="9">Wrzesień</option><option value="10">Październik</option>
                <option value="11">Listopad</option><option value="12">Grudzień</option>
            </select>
        </div>
        <div class="form-group">
            <label for="startYear">Start (Rok)</label>
            <select id="startYear" onchange="updateEndYears()">
                <option value="2026">2026</option>
                <option value="2027">2027</option>
                <option value="2028">2028</option>
                <option value="2029">2029</option>
                <option value="2030">2030</option>
                <option value="2031">2031</option>
            </select>
        </div>
    </div>

    <div class="flex-group">
        <div class="form-group">
            <label for="endMonth">8. Koniec (Miesiąc)</label>
            <select id="endMonth">
                <option value="1">Styczeń</option><option value="2">Luty</option>
                <option value="3">Marzec</option><option value="4">Kwiecień</option>
                <option value="5">Maj</option><option value="6">Czerwiec</option>
                <option value="7">Lipiec</option><option value="8">Sierpień</option>
                <option value="9">Wrzesień</option><option value="10">Październik</option>
                <option value="11">Listopad</option><option value="12" selected>Grudzień</option>
            </select>
        </div>
        <div class="form-group">
            <label for="endYear">Koniec (Rok)</label>
            <select id="endYear">
                <option value="2026">2026</option>
                <option value="2027">2027</option>
                <option value="2028">2028</option>
                <option value="2029">2029</option>
                <option value="2030">2030</option>
                <option value="2031">2031</option>
            </select>
        </div>
    </div>

    <button onclick="calculate()">Oblicz Wypłatę</button>

    <div class="results" id="results" class="hidden"></div>
</div>

<script>
    const commissions = {
        doradca: { ee: 0.28, gaz: 0.28 },
        trener: { ee: 0.34, gaz: 0.34 }
    };

    const tranches = {
        eon: { 2026: 1.0, 2027: 0.90, 2028: 0.70, 2029: 0.50, 2030: 0.50 },
        ekovoltis_do100k: { 2026: 0.60, 2027: 0.60, 2028: 0.60, 2029: 0.30, 2030: 0.10, 2031: 0.10 },
        ekovoltis_pow100k: { 2026: 0.70, 2027: 0.70, 2028: 0.70, 2029: 0.55, 2030: 0.30, 2031: 0.20 }
    };

    function updateSellers() {
        const product = document.getElementById('product').value;
        const sellerSelect = document.getElementById('seller');
        if (product === 'gaz') { sellerSelect.value = 'ekovoltis'; sellerSelect.disabled = true; } 
        else { sellerSelect.disabled = false; }
        updateFormFields();
    }

    function updateFormFields() {
        const product = document.getElementById('product').value;
        const seller = document.getElementById('seller').value;
        const marginGroup = document.getElementById('ekovoltis-margin-group');
        
        let maxYear = 2030; // Domyślnie dla E.ON (EE)
        
        if (seller === 'ekovoltis') {
            marginGroup.classList.remove('hidden');
            maxYear = (product === 'gaz') ? 2029 : 2031; // Ekovoltis: gaz do 2029, EE do 2031
        } else {
            marginGroup.classList.add('hidden');
        }

        // Aktualizacja widoczności lat w polach Start i Koniec
        const startSelect = document.getElementById('startYear');
        const endSelect = document.getElementById('endYear');

        [startSelect, endSelect].forEach(select => {
            for (let i = 0; i < select.options.length; i++) {
                let opt = select.options[i];
                let val = parseInt(opt.value);
                if (val > maxYear) {
                    opt.hidden = true;
                    opt.style.display = 'none';
                } else {
                    opt.hidden = false;
                    opt.style.display = '';
                }
            }
        });

        // Korygowanie wybranego roku, jeśli przekracza nowy limit
        if (parseInt(startSelect.value) > maxYear) startSelect.value = maxYear;
        if (parseInt(endSelect.value) > maxYear) endSelect.value = maxYear;

        updateEndYears();
    }

    function updateEndYears() {
        const startYear = parseInt(document.getElementById('startYear').value);
        const endSelect = document.getElementById('endYear');
        const product = document.getElementById('product').value;
        const seller = document.getElementById('seller').value;
        
        let maxYear = (seller === 'ekovoltis') ? ((product === 'gaz') ? 2029 : 2031) : 2030;

        for (let i = 0; i < endSelect.options.length; i++) {
            let optionYear = parseInt(endSelect.options[i].value);
            // Wyłącz daty wcześniejsze niż Start oraz późniejsze niż dozwolony Max dla produktu
            endSelect.options[i].disabled = (optionYear < startYear) || (optionYear > maxYear);
        }
        
        if (parseInt(endSelect.value) < startYear) { endSelect.value = startYear; }
    }

    function calculate() {
        const role = document.getElementById('role').value;
        const split = parseInt(document.getElementById('split').value);
        const product = document.getElementById('product').value;
        const seller = document.getElementById('seller').value;
        const marginLevel = document.getElementById('marginLevel').value;
        const volume = parseFloat(document.getElementById('volume').value);
        const markup = parseFloat(document.getElementById('markup').value);
        const startMonth = parseInt(document.getElementById('startMonth').value);
        const startYear = parseInt(document.getElementById('startYear').value);
        const endMonth = parseInt(document.getElementById('endMonth').value);
        const endYear = parseInt(document.getElementById('endYear').value);

        if(isNaN(volume) || isNaN(markup)) return alert('Błędne dane liczbowe.');
        if(startYear === endYear && startMonth > endMonth) return alert('Miesiąc zakończenia nie może być wcześniejszy niż miesiąc rozpoczęcia.');

        const commissionRate = commissions[role][product];
        const podatekPIT = 0.19; 
        const mnoznikNetto = 1 - podatekPIT;
        
        let totalSumaNetto = 0;
        let html = `<h3>Wyniki (Prowizja: ${(commissionRate * 100).toFixed(0)}%, Podział: ${split} os.)</h3>`;
        html += `<table><tr><th>Rok</th><th>Masa Marży<br>(m-cy)</th><th>Transza</th><th>Netto (Razem)</th></tr>`;

        for (let y = startYear; y <= endYear; y++) {
            let tranchePct = (seller === 'eon') ? (tranches.eon[y] || 0) : 
                             (marginLevel === 'do100k' ? (tranches.ekovoltis_do100k[y] || 0) : (tranches.ekovoltis_pow100k[y] || 0));

            let activeMonths = (y === startYear && y === endYear) ? (endMonth - startMonth + 1) :
                               (y === startYear) ? (13 - startMonth) :
                               (y === endYear) ? endMonth : 12;

            let rocznaMasaMarzy = (volume / 12) * activeMonths * markup;
            let wyplataNettoRazem = rocznaMasaMarzy * tranchePct * commissionRate * mnoznikNetto;
            totalSumaNetto += wyplataNettoRazem;

            html += `<tr><td>${y}</td><td>${rocznaMasaMarzy.toFixed(2)} zł<br><small>(${activeMonths} m-cy)</small></td>
                     <td>${(tranchePct * 100).toFixed(0)}%</td><td>${wyplataNettoRazem.toFixed(2)} zł</td></tr>`;
        }

        let nettoNaOsobe = totalSumaNetto / split;
        html += `<tr class="summary-row"><th colspan="3" style="text-align:right">SUMA NETTO (ZESPÓŁ):</th><th style="color:#000;">${totalSumaNetto.toFixed(2)} zł</th></tr>`;
        if (split > 1) {
            html += `<tr class="summary-row"><th colspan="3" style="text-align:right; color:#28a745;">NA OSOBĘ (${split} os.):</th><th style="color:#28a745; font-size:1.2em;">${nettoNaOsobe.toFixed(2)} zł</th></tr>`;
        }
        html += `</table>`;
        
        document.getElementById('results').innerHTML = html;
        document.getElementById('results').classList.remove('hidden');
    }
    updateSellers();
</script>
</body>
</html>
